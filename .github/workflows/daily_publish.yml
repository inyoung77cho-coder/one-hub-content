name: ONE-HUB Daily Report Publish

on:
  schedule:
    - cron: "30 7 * * 1-5"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Report date YYYY-MM-DD"
        required: false
        default: ""
      dry_run:
        description: "DRY RUN"
        type: boolean
        required: false
        default: false

env:
  PYTHON_VERSION: "3.11"
  EC2_USER: ubuntu
  JOURNAL_REMOTE_PATH: "/home/ubuntu/one_hub_journals"

jobs:
  publish:
    name: Generate and Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install anthropic python-dotenv

      - name: Set date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            REPORT_DATE="${{ github.event.inputs.report_date }}"
          else
            REPORT_DATE=$(TZ="Asia/Seoul" date "+%Y-%m-%d")
          fi
          echo "report_date=$REPORT_DATE" >> "$GITHUB_OUTPUT"

      - name: Fetch journal from EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          REPORT_DATE="${{ steps.date.outputs.report_date }}"
          mkdir -p $HOME/one_hub_journals
          scp -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=30 "${EC2_USER}@${EC2_HOST}:${JOURNAL_REMOTE_PATH}/${REPORT_DATE}.md" "$HOME/one_hub_journals/${REPORT_DATE}.md" 2>/dev/null || echo "No EC2 journal - stub mode"
          scp -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=30 "${EC2_USER}@${EC2_HOST}:/home/ubuntu/trading.db" "$HOME/trading.db" 2>/dev/null || echo "No DB - using defaults"

      - name: Generate report
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          REPORT_DATE="${{ steps.date.outputs.report_date }}"
          ARGS="--date $REPORT_DATE"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python daily_report_generator.py $ARGS

      - name: Verify file
        run: |
          REPORT_DATE="${{ steps.date.outputs.report_date }}"
          if [ -f "content/daily/${REPORT_DATE}.md" ]; then
            echo "OK"
            head -20 "content/daily/${REPORT_DATE}.md"
          else
            echo "FAIL"
            exit 1
          fi

      - name: Commit and push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          REPORT_DATE="${{ steps.date.outputs.report_date }}"
          git config user.name "ONE-HUB Bot"
          git config user.email "bot@one-hub.io"
          git add "content/daily/${REPORT_DATE}.md"
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "feat(daily): ${REPORT_DATE} daily report"
            git push origin main
          fi

      - name: Telegram notify
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" -d chat_id="$CHAT_ID" -d text="ONE-HUB Daily ${{ steps.date.outputs.report_date }} published" --max-time 10 || echo "Telegram skipped"

      - name: Notify failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" -d chat_id="$CHAT_ID" -d text="ONE-HUB Daily Report failed" --max-time 10 || true
